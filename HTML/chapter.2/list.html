<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <!-- ul means it "unordered list" -->
     <!-- li means list item -->
    <ul>
        <li>sumit</li>
        <li>aryan</li>
        <li>tushar</li>
        <li>ansh</li>
    </ul>
    <!-- ol means it "ordered list" -->
    <ol>
        <li>sumit</li>
        <li>aryan</li>
        <li>tushar</li>
        <li>ansh</li>
    </ol>
</body>
</html>
