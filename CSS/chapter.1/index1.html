<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline, internal and external css</title>
    <!-- this is internal css -->
    <style>
        div{
            color: olive;
            background-color: lightgrey;
        }
    </style>
    <!-- this is external css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- this is inline css -->
    <h1 style="color: navy; background-color: aqua;">haeding line</h1>
    <div>
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Qui illum autem vitae, non amet, optio ratione iste recusandae sunt sequi officia reiciendis!
    </div>
    <span>
        hello this is span tag
    </span>
</body>
</html>
