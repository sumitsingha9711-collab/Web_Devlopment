<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filter</title>
    <style>
        img{
            width: 300px;
            height: 200px;
            margin: 20px;
            border: 2px solid black;
        }
        .img1{
            filter: grayscale(100%);
        }
        .img2{
            filter: sepia(100%);
        }
        .img3{
            filter: blur(5px);
            filter: invert(100%);
        }
        /* and there is more filters like brightness(), contrast(), drop-shadow(), hue-rotate(), opacity(), saturate(), url() etc. */
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="https://images5.alphacoders.com/460/460821.jpg" alt="">
        <img class="img2" src="https://media-exp1.licdn.com/dms/image/D5612AQFX0PGdUAH6zw/article-cover_image-shrink_600_2000/0/1666091743554?e=2147483647&v=beta&t=DpGds_8kyW8nHTOfQmfCiVsM5WiwYZl2-ffSI35WE8M" alt="">
        <img class="img3" src="https://wallpapers.com/images/hd/akshay-kumar-behind-tree-8rnsfb04wx5dj4kr.jpg" alt="">
    </div>
</body>
</html>
