<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation in css</title>
    <style>
        .container{
            background-color: lightgreen;
            height: 50vh;
            width: 90vw;
        }
        .box{
            width: 45px;
            height: 45px;
            background-color: coral;
            animation-name: firstanimation;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
            /* -o-animation-delay: 1s; for opera browser */
            animation-delay: 1s;
            animation-direction: alternate; 
            animation-play-state: running; /* paused */

            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            /* animation: firstanimation 3s cubic-bezier(0.68, -0.15, 0.27, 1.55) 1s infinite alternate; */
            /* animation-fill-mode: forwards; keeps the last frame of the animation */
            /* animation-fill-mode: backwards; keeps the first frame of the animation during the delay period */
            /* animation: secanimation 4s linear infinite; */
        }
        @keyframes firstanimation {
           from{
                transform: translateX(0vw) translateY(30vh) scale(1);
                background-color: coral;
           }
           to{
                transform: translateX(70vw) translateY(0vh) scale(2);
                background-color: gold;
           }
        }
        /* @keyframes secanimation {
            
            0%{
                transform: rotate(60deg);
            }
            25%{
                transform: rotate(120deg);
            }
            50%{
                transform: rotate(180deg);

            }
            75%{
                transform: rotate(240deg);

            }
            100%{
                transform: rotate(360deg);

            } */
            /* here % defines the progress of the animation */
        /* } */
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
