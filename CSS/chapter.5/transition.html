<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css transition</title>
    <style>
        .container{
            height: 400px;
            width: 400px;
            background-color: lightgray;

        }
        .box{
            height: 100px;
            width: 100px;
            background-color: steelblue;
            transition-property: background-color, transform;
            transition-duration: 3s;
            transition-timing-function:  cubic-bezier(0, -0.27, 0.98, 0.45);
            transition-delay: 1s;
            /* transition: all 3s cubic-bezier(0, -0.27, 0.98, 0.45) 1s; this is shorthand and combines all the above properties */
        }
        .transition{
            transform: translateX(10vw) translateY(10vh) scale(0.5);
            background-color: violet;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box transition"></div>
    </div>
</body>
</html>
