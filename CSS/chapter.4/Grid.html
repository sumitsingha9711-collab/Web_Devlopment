<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css grid</title>
    <style>
        .container{
            padding:10px;
            margin: 0px;
            height: 300px;
            width: 700px;
            border: 2px solid red;
            display: grid;
            grid-template-columns: [first] 100px [second] 120px; /*first and second are names for columns*/
            grid-template-rows: 100px 90px 120px;
        }
        .item{
            padding: 0px;
            margin: 0px;
            height: 50px;
            width: 40px;;
            border: 2px solid rgb(19, 124, 223);
        }
        .item4{
            grid-row: 1/2;
            /* grid-column: 1/2; */
            /* also we can use name instead of number */
            grid-column: first/second;
        }
        /* this overlap the item with item4 bcoz both holding same palce */
        /* .item1{
            grid-row: 1/2;
            grid-column: 1/2;
        } */
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item4">4</div>
        <div class="item">5</div>
    </div>
</body>
</html>
