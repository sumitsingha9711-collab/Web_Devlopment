<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sizing unit</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        .box {
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 2000px; */
            width: 80vw;
            /* viewport width --> cover the entire width of the screen */
            margin: auto;
            background-color: lightblue;
        }
    </style>
</head>

<body>
    <div class="box">
        This box is 200 pixels wide.
    </div>
</body>

</html>
