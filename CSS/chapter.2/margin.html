<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box and collasp mergin</title>
    <style>
        .box1{
            padding: 10px;
            margin: 5px;
            background-color: lightcyan;
            border: 2px solid teal;
            height: 50px;
            box-sizing: border-box;
        }
        .box2{
            padding: 10px;
            margin: 5px;
            background-color: rgb(255, 242, 224);
            border: 2px solid rgb(116, 6, 6);
            height: 50px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box1">
        i am a box
    </div>
    <div class="box2">
        i am another box
    </div>
</body>
</html>
