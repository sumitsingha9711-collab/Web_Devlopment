<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> css list </title>
    <style>
        .box{
            display: flex;
            justify-content: center;
            /* align-items: center; */
        }
        nav ul li{
            list-style: devanagari;
            background-color: pink;
            list-style-position: inside;
            border: 2px solid black;
            /* list-style-type: "🐨"; unicode for devanagari digit zero */
            display: flex;
        }
    </style>
</head>

<body>
    <div class="box">
        <nav>
            <ul>
                <li>home</li>
                <li>about</li>
                <li>contact</li>
            </ul>
        </nav>
    </div>
</body>

</html>
