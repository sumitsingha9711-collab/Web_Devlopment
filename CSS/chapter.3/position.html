<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .container{
            width: 100%;
            height: 70vh;
            border: 2px solid black;
            background-color: lightgray;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .box{
            width: 300px;
            height: 300px;
            border: 2px solid black;
            background-color: lightblue;
            position: relative;
        }
        .ball{
            width: 50px;
            height:50px;
            border: 2px solid black;
            border-radius: 50%;
            background-color: orangered;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div>
        <div class="box">
            <div class="ball"></div>
        </div>
    </div>
</body>
</html>
